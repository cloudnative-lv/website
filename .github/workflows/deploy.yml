name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate (lint, translation coverage, event data, unit tests)
        run: npm run validate

      - name: Build
        run: npm run build
        env:
          # Cloudflare subscribe Worker URL; unset -> the form falls back to the
          # CNCF/OCG group page. Set repo variable SUBSCRIBE_ENDPOINT to enable.
          VITE_SUBSCRIBE_ENDPOINT: ${{ vars.SUBSCRIBE_ENDPOINT }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate event artifacts & prerender SEO
        run: |
          npm run preview &
          for i in $(seq 1 60); do curl -sf http://localhost:4173 >/dev/null && break; sleep 1; done
          npm run generate:artifacts
          npm run prerender
          kill %1 || true

      - name: Upload event artifacts (pipeline)
        uses: actions/upload-artifact@v7
        with:
          name: event-artifacts
          path: dist/artifacts

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

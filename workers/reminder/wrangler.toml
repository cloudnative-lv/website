name = "cloudnative-lv-reminder"
main = "src/index.js"
compatibility_date = "2026-06-01"

# account_id = "..." (or pass CLOUDFLARE_ACCOUNT_ID)

[vars]
SITE_URL = "https://cloudnative.lv"
NOTIFY_TO = "hello@cloudnative.lv"
NOTIFY_FROM = "noreply@cloudnative.lv"

# Cloudflare Email Routing send binding (destination must be a verified address).
[[send_email]]
name = "NOTIFY"
destination_address = "hello@cloudnative.lv"

# Daily at 09:00 UTC.
[triggers]
crons = ["0 9 * * *"]

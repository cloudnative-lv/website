name = "cloudnative-lv-subscribe"
main = "src/index.js"
compatibility_date = "2026-06-01"

account_id = "2206fc831247e31fb22b657089145789"
workers_dev = false

# Served under cloudnative.lv (not the account's workers.dev subdomain).
[[routes]]
pattern = "subscribe.cloudnative.lv"
custom_domain = true

[vars]
ALLOWED_ORIGINS = "https://cloudnative.lv,http://localhost:5173,http://localhost:4173"
# send_email can only deliver to a *verified* Email Routing destination address.
# andrey@extremeautomation.io is already verified (the catch-all / andrey@ target), so
# notifications deliver with no dashboard step. hello@cloudnative.lv is a Worker *route*,
# not a destination, so it can't receive worker-sent mail.
NOTIFY_TO = "andrey@extremeautomation.io"
NOTIFY_FROM = "noreply@cloudnative.lv"
SUBSCRIBERS_KEY = "subscribers.csv"

# R2 bucket that stores subscribers.csv — the single source of truth.
# Create it once: npx wrangler r2 bucket create cloudnative-lv
[[r2_buckets]]
binding = "SUBSCRIBERS"
bucket_name = "cloudnative-lv"

# Cloudflare Email Routing send binding. No destination_address = may send to any
# *verified* Email Routing destination; the recipient comes from NOTIFY_TO.
[[send_email]]
name = "NOTIFY"

talks:
  - title: "Creating a Platform That Can Move Where GPUs Are Available"
    speaker: "Nicklas Frahm"
    slidesUrl: "/slides/2026-06-10-meetup-006/kommodity-one-binary-to-rule-them-all.pdf"
    description: "Building sovereign AI infrastructure that can follow GPU availability across clouds. This talk explores Kommodity - an open source Kubernetes engine built on Talos Linux and Cluster API - paired with KServe-based inference using vLLM and NVIDIA Triton, and walks through a real migration from Azure to Scaleway."
  - title: "Secret Agents: Identity for AI Workloads"
    speaker: "Andrey Adamovich"
    slidesUrl: "/slides/2026-06-10-meetup-006/secret-agents-identity-for-ai-workloads.pdf"
    description: "Autonomous AI agents need to authenticate and act - but handing them long-lived credentials is a recipe for trouble. This talk covers identity for AI workloads: how to issue short-lived, attestable, least-privilege credentials so agents can safely reach the infrastructure they need."

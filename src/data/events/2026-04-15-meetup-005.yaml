talks:
  - title: "What's a Kubestronaut (good for)?"
    speaker: "Gerret Apelt"
    slidesUrl: "https://golden-kubestronaut-presentation-3134b1.gitlab.io/"
    description: "What does the CNCF Kubestronaut certification program actually involve - and is it worth it? This talk walks through the program's structure, costs, and rewards, sharing a personal journey all the way to Golden Kubestronaut status. Expect honest takes on preparation strategies, exam difficulty, and the baseline technical competency the certifications really demonstrate."
  - title: "The Beginning of a Journey to the Edge with Talos Kubernetes"
    speakers:
      - "Khaled Hammoun"
      - "Daniel Hansen"
    slidesUrl: "/slides/2026-04-15-meetup-005/journey-to-the-edge-with-talos.pdf"
    description: "JYSK shares its strategy for deploying Kubernetes across 3,500+ distributed retail locations worldwide. The talk digs into real-world challenges - bandwidth constraints, hardware diversity, and operations at scale - and explains how Talos Linux enabled a unified platform deployment across resource-limited edge environments."

# Cloud Native Latvia — LinkedIn posts index
#
# Extracted from the CNL company Posts feed (linkedin.com/company/cloud-native-latvia).
# Each LinkedIn activity id forms a public permalink:
#   https://www.linkedin.com/feed/update/urn:li:activity:<id>/
#
# Keyed by event id (matches src/data/events/*.yaml). Posts not tied to a single
# event (member intros, the year retro) are grouped under `org:` at the bottom.
#
# This file is a reference index only — it is not yet wired into the UI. Its two
# uses: (1) source links if we later add "discussed on LinkedIn" references to
# event pages, and (2) a map of which posts carry each event's photo gallery.
#
# PHOTOS NOTE: recap-post images are signed media.licdn.com URLs that EXPIRE and
# cannot be hot-linked. The `recaps[].photos` count tells you which posts hold an
# event's gallery; download the originals and drop them into
# src/assets/events/<event-id>/ to publish them (see AGENTS.md → Photo galleries).


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 320" fill="#d4567c" fill-rule="evenodd">
  <!-- Simple Riga skyline: a single-tone silhouette of the iconic landmarks, no clouds,
       no foreground gradient — reads cleanly at any banner size. Baseline at y=300. -->
  <rect x="0" y="298" width="1600" height="22"/>

  <!-- left low buildings -->
  <rect x="70" y="240" width="46" height="60"/>
  <rect x="124" y="214" width="40" height="86"/>
  <rect x="172" y="252" width="34" height="48"/>

  <!-- Freedom Monument (Brīvības piemineklis) -->
  <rect x="246" y="284" width="60" height="16"/>
  <rect x="262" y="252" width="28" height="34"/>
  <rect x="271" y="96" width="10" height="158"/>
  <path d="M276 70 l8 18 -8 6 -8 -6 z"/>

  <!-- mid building -->
  <rect x="330" y="244" width="48" height="56"/>

  <!-- St. Peter's Church: square tower + tall slim spire + cross -->
  <rect x="408" y="206" width="50" height="94"/>
  <path d="M408 208 H458 L433 58 Z"/>
  <rect x="429" y="40" width="8" height="22"/>
  <rect x="421" y="46" width="24" height="7"/>

  <!-- Riga Cathedral: tower + dome + weathercock -->
  <rect x="520" y="226" width="56" height="74"/>
  <path d="M520 228 q28 -58 56 0 Z"/>
  <rect x="544" y="176" width="8" height="34"/>
  <circle cx="548" cy="172" r="7"/>

  <!-- House of the Blackheads style stepped gable -->
  <path d="M628 300 V236 H712 V236 L688 236 L688 210 L670 210 L670 190 L652 210 L652 236 L628 236 Z"/>
  <rect x="628" y="232" width="84" height="68"/>
  <path d="M652 232 V206 L670 188 L688 206 V232 Z"/>

  <!-- block of mid-rise buildings -->
  <rect x="752" y="252" width="44" height="48"/>
  <rect x="800" y="224" width="52" height="76"/>
  <rect x="858" y="244" width="40" height="56"/>

  <!-- Vanšu cable-stayed bridge: mast + fanned cables + deck -->
  <rect x="980" y="290" width="320" height="10"/>
  <rect x="1132" y="120" width="14" height="172"/>
  <g stroke="#d4567c" stroke-width="3">
    <line x1="1139" y1="126" x2="1000" y2="290"/>
    <line x1="1139" y1="126" x2="1044" y2="290"/>
    <line x1="1139" y1="126" x2="1088" y2="290"/>
    <line x1="1139" y1="126" x2="1190" y2="290"/>
    <line x1="1139" y1="126" x2="1234" y2="290"/>
    <line x1="1139" y1="126" x2="1278" y2="290"/>
  </g>

  <!-- National Library (Castle of Light): asymmetric rising peak -->
  <path d="M1352 300 V232 L1452 132 L1470 152 L1470 300 Z"/>

  <!-- right low buildings -->
  <rect x="1492" y="236" width="40" height="64"/>
  <rect x="1540" y="258" width="44" height="42"/>
</svg>
